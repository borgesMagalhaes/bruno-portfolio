  &lt;main class=&quot;page&quot;&gt;
    &lt;header&gt;
      &lt;h1&gt;Bruno Magalhães&lt;/h1&gt;
      &lt;p class=&quot;subtitle&quot;&gt;Arquiteto de Software &amp; Especialista em Banco de Dados&lt;/p&gt;
      &lt;p class=&quot;contact&quot;&gt;
        São Luís, MA | +55 98 98814-8846 |
        &lt;a href=&quot;mailto:borges.magalhaes@gmail.com&quot;&gt;borges.magalhaes@gmail.com&lt;/a&gt; |
        &lt;a href=&quot;https://brunomagalhaes.dev.br/&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer&quot;&gt;https://brunomagalhaes.dev.br/&lt;/a&gt; |
        &lt;a href=&quot;https://www.linkedin.com/in/bruno-b-magalhaes/&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer&quot;&gt;LinkedIn&lt;/a&gt; |
        &lt;a href=&quot;https://github.com/borgesMagalhaes&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer&quot;&gt;GitHub&lt;/a&gt;
      &lt;/p&gt;
    &lt;/header&gt;
    &lt;section&gt;
      &lt;h2&gt;Resumo Profissional&lt;/h2&gt;
      &lt;p&gt;Arquiteto de Software e Especialista em Banco de Dados com mais de 10 anos de experiência em arquitetura, sustentação e evolução de sistemas críticos no setor público e privado.&lt;/p&gt;
      &lt;p&gt;&lt;strong&gt;Objetivo:&lt;/strong&gt; Arquiteto de Software .NET / Líder Técnico e Especialista em Banco de Dados SQL Server / DBA.&lt;/p&gt;
      &lt;p&gt;&lt;strong&gt;Expertise:&lt;/strong&gt; .NET Full Stack, APIs RESTful, SQL Server, T-SQL, performance tuning, backup e recovery, segurança de dados, liderança ágil com Scrum e Kanban.&lt;/p&gt;
    &lt;/section&gt;
    &lt;section&gt;
      &lt;h2&gt;Experiência Profissional&lt;/h2&gt;
      
      &lt;article class=&quot;item&quot;&gt;
        &lt;h3&gt;Arquiteto de Software - LAMPP-IT SOLUTIONS&lt;/h3&gt;
        &lt;p class=&quot;meta-line&quot;&gt;São Luís/MA | Fev 2022 - Fev 2024 | 2 anos&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;Liderei a arquitetura de software para projetos governamentais em .NET com foco em escalabilidade e manutenção.&lt;/li&gt;&lt;li&gt;Coordenei equipes com Scrum e Kanban, sustentando fluxo contínuo e alinhamento técnico.&lt;/li&gt;&lt;li&gt;Modelei dados e estratégias de banco com Power Designer para apoiar decisões de arquitetura.&lt;/li&gt;&lt;li&gt;Otimizei aplicações e consultas SQL para maior desempenho e estabilidade.&lt;/li&gt;&lt;li&gt;Implantei boas práticas de engenharia, padronização de código e revisão técnica.&lt;/li&gt;
        &lt;/ul&gt;
        
      &lt;/article&gt;
    
      &lt;article class=&quot;item&quot;&gt;
        &lt;h3&gt;Supervisor de Banco de Dados - SQL Server - Secretaria Municipal de Saúde&lt;/h3&gt;
        &lt;p class=&quot;meta-line&quot;&gt;São Luís/MA | Fev 2022 - Fev 2024 | 2 anos&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;Supervisionei a equipe de DBAs em operações de missão crítica.&lt;/li&gt;&lt;li&gt;Conduzi otimizações de performance com ajustes de índices, planos e consultas.&lt;/li&gt;&lt;li&gt;Implementei e acompanhei políticas de backup e recovery.&lt;/li&gt;&lt;li&gt;Administrei segurança e integridade com permissões e criptografia.&lt;/li&gt;&lt;li&gt;Atuei em incidentes críticos em ambiente operacional 24x7.&lt;/li&gt;
        &lt;/ul&gt;
        &lt;p class=&quot;small&quot;&gt;&lt;strong&gt;Detalhes:&lt;/strong&gt; Atividades DBA: instalação e atualização de instâncias SQL Server; monitoramento com DMVs e Extended Events; Always On Availability Groups; automação com T-SQL; migrações; jobs do SQL Server Agent.&lt;/p&gt;
      &lt;/article&gt;
    
      &lt;article class=&quot;item&quot;&gt;
        &lt;h3&gt;Supervisor de Desenvolvimento de Sistemas - Secretaria de Estado da Educação do Maranhão&lt;/h3&gt;
        &lt;p class=&quot;meta-line&quot;&gt;São Luís/MA | Nov 2019 - Fev 2022 | 2 anos e 4 meses&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;Gerenciei equipe de desenvolvimento e implementação de web services SOAP e REST.&lt;/li&gt;&lt;li&gt;Atuei em análise, desenho de solução e desenvolvimento Full Stack com .NET.&lt;/li&gt;&lt;li&gt;Coordenei projetos de integração entre sistemas e otimizações de banco de dados.&lt;/li&gt;&lt;li&gt;Implantei e mantive ambientes de produção com foco em estabilidade.&lt;/li&gt;
        &lt;/ul&gt;
        
      &lt;/article&gt;
    
      &lt;article class=&quot;item&quot;&gt;
        &lt;h3&gt;Analista de Sistemas Sênior - Secretaria de Estado da Educação do Maranhão&lt;/h3&gt;
        &lt;p class=&quot;meta-line&quot;&gt;São Luís/MA | Mar 2011 - Dez 2019 | 8 anos e 9 meses&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;Desenvolvi soluções Full Stack com VB.NET, Crystal Reports e SQL Server.&lt;/li&gt;&lt;li&gt;Projetei e otimizei stored procedures, functions e views.&lt;/li&gt;&lt;li&gt;Elaborei relatórios corporativos e atuei na evolução de sistemas legados.&lt;/li&gt;&lt;li&gt;Prestei suporte técnico especializado para usuários e áreas de negócio.&lt;/li&gt;
        &lt;/ul&gt;
        
      &lt;/article&gt;
    
    &lt;/section&gt;
    &lt;section class=&quot;grid&quot;&gt;
      &lt;div&gt;
        &lt;h2&gt;Formação Acadêmica&lt;/h2&gt;
        &lt;ul&gt;&lt;li&gt;Especialização em Ciência de Dados: Big Data e Analytics - UNYLEYA (2021 - 2022)&lt;/li&gt;&lt;li&gt;Especialização em Análise e Projeto de Sistemas - UFMA (2014 - 2016)&lt;/li&gt;&lt;li&gt;Especialização em Planejamento e Implementação de Redes LAN e WAN - UEMA (2013 - 2014)&lt;/li&gt;&lt;li&gt;Bacharel em Sistemas de Informação - UniCeuma (2005 - 2011)&lt;/li&gt;&lt;/ul&gt;
      &lt;/div&gt;
      &lt;div&gt;
        &lt;h2&gt;Certificações e Idiomas&lt;/h2&gt;
        &lt;ul&gt;&lt;li&gt;MCTS: SQL Server 2008&lt;/li&gt;&lt;li&gt;Scrum Foundation Certified&lt;/li&gt;&lt;li&gt;Português: Nativo&lt;/li&gt;&lt;li&gt;Inglês: Fluente (leitura, escrita e conversação)&lt;/li&gt;&lt;/ul&gt;
      &lt;/div&gt;
    &lt;/section&gt;
    &lt;section&gt;
      &lt;h2&gt;Habilidades Técnicas&lt;/h2&gt;
      &lt;p&gt;&lt;strong&gt;Database:&lt;/strong&gt; SQL Server, T-SQL, Performance Tuning, Backup &amp; Recovery, Always On, Replication, SSIS, MySQL.&lt;/p&gt;
      &lt;p&gt;&lt;strong&gt;Languages:&lt;/strong&gt; C#, VB.NET, ASP.NET, HTML, CSS, JavaScript, Python, Flask, React, Kotlin.&lt;/p&gt;
      &lt;p&gt;&lt;strong&gt;DevOps:&lt;/strong&gt; Docker, CI/CD, Azure DevOps, Visual Studio, SSMS, Power Designer, Git, GitHub.&lt;/p&gt;
      &lt;p&gt;&lt;strong&gt;Methodologies:&lt;/strong&gt; Scrum, Kanban, Modelagem de Dados, Arquitetura de Software.&lt;/p&gt;
    &lt;/section&gt;
    &lt;section&gt;
      &lt;h2&gt;Cursos Relevantes&lt;/h2&gt;
      &lt;ul&gt;&lt;li&gt;Python para Análise de Dados (2025), Containers com Docker e Docker Compose (2025), Fundamentos da Cultura DevOps (2025).&lt;/li&gt;&lt;li&gt;Imersão Front-end (2025), SQL (2024), Programação em Python (2024), Microsoft Power BI (2024).&lt;/li&gt;&lt;li&gt;TOTVS Workflows (2024), Fluig Plataforma (2024), Consultas SQL + TOTVS Inteligência de Negócios (2023).&lt;/li&gt;&lt;li&gt;Modelagem de Banco de Dados Relacional (2022), Git/GitHub e Pull Requests (2020).&lt;/li&gt;&lt;/ul&gt;
    &lt;/section&gt;
